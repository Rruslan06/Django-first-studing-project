<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<form action="{% url 'first_app:vote' question.id %}" method="post">
    {% csrf_token %} <!--Защита от атаки «Межсайтовая подделка запроса». Без этой «печати» Django не примет POST-запрос от браузера, считая его враждебным.-->

    <fieldset>
        <legend><h1> {{question.question_text}} </h1></legend>
        
        {% if error_message %}
            <p><strong> {{error_message}} </strong></p>
        {% endif %}

        {% for choice in question.choice_set.all %}   <!--forloop.counter каждую итерацию увеличивает с единицы-->
            <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{choice.id}}">
            <label for="choice{{ forloop.counter }}"> {{ choice.choice_text }} </label><br>
        {% endfor %}  
    </fieldset>
    <input type="submit" value="Vote">
</form>


</body>
</html>
